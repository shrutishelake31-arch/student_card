<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>

    <style>

        body{
            background-color: #f4ede1;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .card{
            width: 500px;
            background-color: white;
            margin: 40px auto;
            padding: 30px;
            border: 2px solid #c9b59c;
            border-radius: 20px;
        }

        img{
            width: 180px;
            border-radius: 15px;
        }

        h1{
            color: #8b2f2f;
            margin-top: 15px;
        }

        .role{
            font-size: 22px;
        }

        .college{
            font-size: 18px;
            padding: 10px;
        }

        h2{
            color: #8b2f2f;
        }

        .skill-box{
            background-color: #f4ede1;
            border: 1px solid #8b2f2f;
            padding: 10px;
            margin: 10px auto;
            width: 120px;
            border-radius: 10px;
        }

        .contact-box{
            background-color: #f8f8f8;
            border: 1px solid black;
            padding: 15px;
            margin: 15px auto;
            border-radius: 10px;
        }

        button{
            background-color: #8b2f2f;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

    </style>

</head>
<body>

    <div class="card">

        <img src="image.png" alt="Shruti Photo">

        <h1>SHRUTI SHELAKE</h1>

        <p class="role">Computer Science Student</p>

        <p class="college">
            Karmaveer Bhaurao Patil College of Engineering
        </p>

        <h2>Skills</h2>

        <div class="skill-box">HTML</div>

        
        <div class="skill-box">CSS</div>
        

        <div class="contact-box">
            📞 9130695553
        </div>

        <div class="contact-box">
            📧 shrutishelake31@gmail.com
        </div>

        <button>Contact Me</button>

    </div>

</body>
</html>
